# Unity 引擎配置
# 用于 code-analyze、code-modify 等技能解析 Unity C# 脚本

engine: Unity
language: C#
filePattern: "*.cs"

# TAG 提取：类名作为稳定标识
tagExtract:
  pattern: "^\\s*(?:public\\s+)?class\\s+(\\w+)"
  group: 1
  fallbackPattern: "^\\s*namespace\\s+(\\w+)"

# 事件系统（部分项目使用自定义框架）
eventSystem:
  watch:
    - pattern: "\\.Observe\\(\"([^\"]+)\""
      description: "自定义 Observe 订阅"
    - pattern: "AddListener\\("
      description: "Unity UI 事件"
  fire:
    - pattern: "\\.Publish\\(\"([^\"]+)\""
      description: "自定义 Publish 触发"
    - pattern: "\\.Invoke\\(\""
      description: "Unity EventSystem"

# UI 绑定
uiBinding:
  findNode:
    - pattern: "\\.transform\\.Find\\(\"([^\"]+)\"\\)"
      group: 1
      description: "Transform.Find 查找节点"
    - pattern: "GetComponent<(\\w+)>\\(\\)"
      group: 1
      description: "获取组件"

# 日志
logging:
  error:
    - pattern: "Debug\\.LogError\\("
      template: "Debug.LogError(\"[{func}] {msg}\");"
    - pattern: "Debug\\.Exception"
      template: "Debug.LogException(e);"
  info:
    - pattern: "Debug\\.Log\\("
      template: "Debug.Log(\"[{func}] {msg}\");"
  warning:
    - pattern: "Debug\\.LogWarning\\("
      template: "Debug.LogWarning(\"[{func}] {msg}\");"

# HTTP 请求
http:
  patterns:
    - "UnityWebRequest"
    - "HttpClient"
    - "WebRequest"
  mock: "#if UNITY_EDITOR"

# 组件生命周期
lifecycle:
  awake: "Awake()"
  start: "Start()"
  update: "Update()"
  onDestroy: "OnDestroy()"

# 代码质量
qualityPatterns:
  nilCheck: "if \\(.* == null\\)"
  async: "async\\s+Task"
